<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>简单草本 POS 系统</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">可上线 / 可离线</p>
      <h1>简单草本 POS 系统</h1>
    </div>
    <div class="status-row">
      <span id="networkStatus" class="status">检测中</span>
      <span id="cloudStatus" class="status">云端未连接</span>
      <span id="branchStatus" class="status">总店</span>
      <span id="operatorStatus" class="status">POS未登录</span>
      <span id="adminStatus" class="status">后台未登录</span>
      <button id="installBtn" class="ghost hidden" type="button">安装到电脑</button>
    </div>
  </header>

  <main class="app-shell">
    <section class="panel catalog-panel" aria-labelledby="catalogTitle">
      <div class="panel-header">
        <div>
          <h2 id="catalogTitle">商品</h2>
          <p>点击商品加入购物车</p>
        </div>
        <button id="seedBtn" class="ghost" type="button">恢复示例商品</button>
      </div>

      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="搜索商品名称或条码">
        <select id="categoryFilter" aria-label="按分类筛选">
          <option value="all">全部分类</option>
        </select>
        <select id="branchSelect" aria-label="当前分行">
          <option value="hq">总店</option>
          <option value="branch-1">分行 1</option>
          <option value="branch-2">分行 2</option>
        </select>
        <button id="refreshCloudBtn" class="ghost" type="button">刷新云端资料</button>
      </div>

      <div id="productGrid" class="product-grid" aria-live="polite"></div>
    </section>

    <section class="panel cart-panel" aria-labelledby="cartTitle">
      <div class="panel-header">
        <div>
          <h2 id="cartTitle">当前订单</h2>
          <p id="cartHint">还没有商品</p>
        </div>
        <button id="clearCartBtn" class="ghost danger" type="button">清空</button>
      </div>

      <div id="cartItems" class="cart-items"></div>

      <div class="totals">
        <form id="operatorLoginForm" class="operator-login">
          <strong>POS 使用者</strong>
          <input id="operatorEmailInput" type="email" autocomplete="username" required placeholder="授权用户邮箱">
          <button class="primary" type="submit">登录收银</button>
          <button id="googleLoginBtn" class="ghost" type="button">Google 登录</button>
          <button id="operatorLogoutBtn" class="ghost hidden" type="button">退出收银</button>
          <p id="operatorMessage" class="form-message">请使用管理员授权的邮箱登录后收银。</p>
        </form>
        <div class="customer-box">
          <strong>客户资料</strong>
          <input id="customerNameInput" placeholder="客户姓名">
          <input id="customerPhoneInput" placeholder="电话 / WhatsApp">
        </div>
        <label>
          折扣
          <input id="discountInput" type="number" min="0" step="0.01" value="0">
        </label>
        <label>
          实收
          <input id="paidInput" type="number" min="0" step="0.01" placeholder="客户付款金额">
        </label>
        <div class="total-line">
          <span>小计</span>
          <strong id="subtotalText">RM 0.00</strong>
        </div>
        <div class="total-line">
          <span>应收</span>
          <strong id="totalText">RM 0.00</strong>
        </div>
        <div class="total-line">
          <span>找零</span>
          <strong id="changeText">RM 0.00</strong>
        </div>
        <button id="checkoutBtn" class="primary" type="button">完成收款</button>
      </div>
    </section>

    <section class="panel admin-panel" aria-labelledby="adminTitle">
      <div class="panel-header">
        <div>
          <h2 id="adminTitle">后台管理</h2>
          <p>唯一管理员：stanleyhoh79@gmail.com</p>
        </div>
        <button id="adminLogoutBtn" class="ghost hidden" type="button">退出后台</button>
      </div>

      <form id="adminLoginForm" class="admin-login">
        <input id="adminEmailInput" type="email" autocomplete="username" required placeholder="输入管理员邮箱">
        <button class="primary" type="submit">进入后台</button>
        <button id="adminGoogleLoginBtn" class="ghost" type="button">Google 管理员登录</button>
        <p id="adminLoginMessage" class="form-message">商品管理、导出销售记录和清空数据仅管理员可用。</p>
      </form>

      <div id="adminContent" class="hidden">
        <div class="global-dashboard">
          <div class="metric-card">
            <span>全局销售额</span>
            <strong id="globalRevenueText">RM 0.00</strong>
          </div>
          <div class="metric-card">
            <span>全局订单</span>
            <strong id="globalOrdersText">0</strong>
          </div>
          <div class="metric-card">
            <span>客户数</span>
            <strong id="globalCustomersText">0</strong>
          </div>
          <div class="metric-card">
            <span>总库存</span>
            <strong id="globalStockText">0</strong>
          </div>
        </div>

        <div class="panel-subsection">
          <h3>分行表现</h3>
          <div id="branchOverview" class="branch-overview"></div>
        </div>

        <div class="panel-subsection">
          <h3>开设新分行</h3>
          <form id="branchForm" class="branch-form">
            <input id="branchNameInput" required placeholder="分行名称，例如：槟城分行">
            <button class="primary" type="submit">新增分行</button>
          </form>
          <div id="branchList" class="management-list"></div>
        </div>

        <div class="panel-subsection">
          <h3>授权 POS 用户</h3>
          <form id="userForm" class="user-form">
            <input id="userNameInput" required placeholder="使用者姓名">
            <input id="userEmailInput" required type="email" placeholder="使用者邮箱">
            <select id="userBranchSelect" required aria-label="授权分行"></select>
            <button class="primary" type="submit">授权使用</button>
          </form>
          <div id="userList" class="management-list"></div>
        </div>

        <form id="productForm" class="product-form">
          <input id="nameInput" required placeholder="商品名称">
          <input id="barcodeInput" placeholder="条码 / SKU">
          <input id="categoryInput" required placeholder="分类">
          <input id="priceInput" required type="number" min="0" step="0.01" placeholder="售价">
          <input id="stockInput" required type="number" min="0" step="1" placeholder="当前分行库存">
          <button class="primary" type="submit">保存商品</button>
        </form>

        <div class="admin-actions">
          <button id="initCloudBtn" class="ghost" type="button">初始化云端数据</button>
          <button id="exportBtn" class="ghost" type="button">导出销售记录</button>
          <button id="resetDataBtn" class="ghost danger" type="button">清空全部数据</button>
        </div>
      </div>
    </section>

    <section class="panel history-panel" aria-labelledby="historyTitle">
      <div class="panel-header">
        <div>
          <h2 id="historyTitle">今日销售</h2>
          <p id="salesSummary">暂无销售</p>
        </div>
      </div>
      <div id="salesList" class="sales-list"></div>
    </section>
  </main>

  <dialog id="receiptDialog">
    <div class="receipt">
      <div class="panel-header">
        <div>
          <h2>收款成功</h2>
          <p id="receiptNo"></p>
        </div>
        <button id="closeReceiptBtn" class="ghost" type="button">关闭</button>
      </div>
      <pre id="receiptText"></pre>
      <button id="printReceiptBtn" class="primary" type="button">打印小票</button>
    </div>
  </dialog>

  <script src="app.js"></script>
  <script type="module" src="firebase-cloud.js"></script>
</body>
</html>
